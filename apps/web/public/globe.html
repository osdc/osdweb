<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSDC 2D Canvas Globe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #071a3d; }
  canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ═══════════════════════════════════════════════════════════
//  OSDC Globe  –  2D scrolling dot strip, circular viewport
//
//  Core model:
//    • A horizontal strip of dots scrolls LEFT across the screen.
//    • A circular clip masks the visible area into a "globe".
//    • Land = holes (dots absent). OSDC = also a hole.
//    • Scrolling left = globe rotating eastward (Europe→Asia→Pacific→Americas).
//
//  Land mask: 1024×512 binary PNG (white=land) baked from
//  the three.js earth specular map and embedded as base64.
// ═══════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d', { alpha: false, desynchronized: true });
const params = new URLSearchParams(window.location.search);
const mode   = params.get('mode') || 'background';

const MODE_CONFIG = {
  background: { fps: 28, density: 2.25, maxDpr: 1.2 },
  feature:    { fps: 22, density: 2.1,  maxDpr: 1.0 },
  mini:       { fps: 12, density: 1.4,  maxDpr: 1.0 }
};

const activeConfig = MODE_CONFIG[mode] || MODE_CONFIG.background;

// ── Final locked design values ────────────────
const RING_SCALE = 0.40;
const DENSITY    = Number(params.get('density')) || activeConfig.density;
const TARGET_FPS = Math.max(8, Number(params.get('fps')) || activeConfig.fps);
const MAX_DPR    = Math.max(1, Number(params.get('dpr')) || activeConfig.maxDpr);
const FRAME_TIME = 1000 / TARGET_FPS;

let paused = params.get('paused') === '1';
let lastPaintTime = 0;

const BG      = '#071a3d';
const DOT_COL = 'rgba(255,255,255,0.93)';
const SCROLL_SPEED = 106;  // final speed
const BULGE_AMOUNT = 2.50; // final bulge
const OSDC_X_FACTOR = 1.060; // final logo x placement
const OSDC_Y_OFFSET = -0.050; // final logo y placement

if (ctx) {
  ctx.imageSmoothingEnabled = false;
}

// ── Layout (recalculated on resize) ───────────
let CX, CY, R;        // globe circle centre and radius
let scrollOffset = 0; // how many px the strip has scrolled left (0 → PERIOD)
let lastTime     = null;

// PERIOD: the strip repeats every PERIOD pixels.
// We set PERIOD = 2π·R so one full scroll = one full equator pass.
const PERIOD_MULT = Math.PI * 2;

// ── Dot grid ──────────────────────────────────
let rows = [];
const BASE_SX = 21;  // px between dot columns at density=1
const BASE_SY = 19;  // px between dot rows at density=1

// ── Stencils ──────────────────────────────────
let worldMask = null;  // { mask:Uint8Array, W, H }
let osdcMask  = null;  // { data, W, H, x0, y0, cx } — strip-space position

// ─────────────────────────────────────────────
//  A. Land mask – embedded 1024×512 PNG
//     white pixel (r>128) = land = no dot
//     Coordinate system: equirectangular
//       u = (lon + 180) / 360
//       v = (90  − lat) / 180
// ─────────────────────────────────────────────

function loadWorldMask() {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const oc = document.createElement('canvas');
      oc.width = MAP_W; oc.height = MAP_H;
      const ox = oc.getContext('2d');
      ox.drawImage(img, 0, 0, MAP_W, MAP_H);
      const raw  = ox.getImageData(0, 0, MAP_W, MAP_H).data;
      const mask = new Uint8Array(MAP_W * MAP_H);
      for (let i = 0; i < MAP_W * MAP_H; i++) {
        mask[i] = raw[i * 4] > 128 ? 1 : 0;
      }
      worldMask = { mask, W: MAP_W, H: MAP_H };
      resolve();
    };
    img.src = EARTH_DATA_URL;
  });
}

function loadOSDCLogo() {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      osdcLogoImg = img;
      resolve();
    };
    img.src = OSDC_LOGO_DATA_URL;
  });
}

// ─────────────────────────────────────────────
//  B. OSDC stencil – rasterised from the actual OSDC SVG logo
//     and placed in the Pacific gap between Australia and North America.
// ─────────────────────────────────────────────
function buildOSDCMask() {
  const PERIOD = R * PERIOD_MULT;

  if (!osdcLogoImg) return;

  /*
    Use the actual OSDC logo shape instead of plain text.
    The source image is a cropped raster derived from the uploaded SVG, embedded
    into this file so the page stays standalone.

    Keep it narrow enough to sit inside the Pacific gap without erasing Asia or
    Australia, but large enough to read with bigger dots.
  */
  const offW = Math.round(R * 1.44);
  const offH = Math.round(offW * (osdcLogoImg.height / osdcLogoImg.width));

  const cx = PERIOD * OSDC_X_FACTOR;
  const x0 = cx - offW / 2;
  const y0 = -offH / 2 + R * OSDC_Y_OFFSET;

  // Set a placeholder immediately so osdcZone() still knows where the bright side is.
  const version = ++osdcMaskVersion;
  osdcMask = { data: null, W: offW, H: offH, cx, x0, y0 };

  const oc = document.createElement('canvas');
  oc.width = offW;
  oc.height = offH;
  const ox = oc.getContext('2d');
  ox.clearRect(0, 0, offW, offH);

  // Draw the actual logo. It is already tightly cropped.
  ox.drawImage(osdcLogoImg, 0, 0, offW, offH);

  // Slightly dilate the mask for readability with bigger / fewer dots.
  ox.globalCompositeOperation = 'source-over';
  ox.drawImage(oc, -1, 0);
  ox.drawImage(oc,  1, 0);
  ox.drawImage(oc, 0, -1);
  ox.drawImage(oc, 0,  1);

  const data = ox.getImageData(0, 0, offW, offH).data;
  if (version !== osdcMaskVersion) return;

  osdcMask = { data, W: offW, H: offH, cx, x0, y0 };
}

// ─────────────────────────────────────────────
//  C. Hex dot grid
//     Dots have fixed baseX in [0, PERIOD).
//     On each frame, visible stripX = (baseX − scrollOffset + PERIOD×N) % PERIOD
//     screenX = (CX − R) + stripX
//     As scrollOffset increases, stripX decreases, screenX decreases → dots move LEFT.
// ─────────────────────────────────────────────
function buildDotRows() {
  rows = [];
  const sx     = BASE_SX / DENSITY;
  const sy     = BASE_SY / DENSITY;
  const PERIOD = R * PERIOD_MULT;

  // No duplicate modulo columns. Wrapping copies are handled in render().
  const count  = Math.ceil(PERIOD / sx);
  const rowN   = Math.ceil((2 * R + sy * 2) / sy) + 2;
  const yStart = -R - sy;
  const GLYPHS = ['O','S','D','C','O','S','D','C','O','S'];

  function seeded(seed) {
    return ((Math.sin(seed) * 43758.5453) % 1 + 1) % 1;
  }

  for (let ri = 0; ri < rowN; ri++) {
    const y   = yStart + ri * sy;
    const off = (ri % 2) * (sx * 0.5);
    const dots = [];

    for (let di = 0; di < count; di++) {
      const baseX = di * sx + off;
      if (baseX >= PERIOD) continue;

      const seed = ri * 1009 + di * 917 + baseX * 0.73;

      dots.push({
        baseX,
        glyph: GLYPHS[(di * 3 + ri * 7) % GLYPHS.length],
        phase: seeded(seed * 0.121) * Math.PI * 2,
        speed: 2.0 + seeded(seed * 0.097 + 1.7) * 2.6,
        speed2: 1.5 + seeded(seed * 0.083 + 3.1) * 2.0,
        sparklePhase: seeded(seed * 0.061 + 5.9) * Math.PI * 2,
        sizeMul: 0.94 + seeded(seed * 0.133 + 2.5) * 0.12,
        flavor: seeded(seed * 0.149 + 0.4)
      });
    }

    rows.push({ y, dots });
  }
}

// ─────────────────────────────────────────────
//  D. Hole samplers
// ─────────────────────────────────────────────

// stripX: canonical position in [0, PERIOD)
// stripY: row y relative to CY, range ≈ −R..+R
function isWorldHole(stripX, stripY) {
  if (!worldMask) return false;
  const { mask, W, H } = worldMask;
  const PERIOD = R * PERIOD_MULT;

  // Longitude: linear mapping of strip → equirectangular u
  const u = stripX / PERIOD;

  // Latitude: linear mapping stripY (−R..+R) → lat (+80..−80)
  // then equirectangular v = (90 − lat) / 180
  const lat = -(stripY / R) * 80;
  const v   = (90 - lat) / 180;

  const mx = Math.floor(((u % 1) + 1) % 1 * W);
  const my = Math.max(0, Math.min(H - 1, Math.floor(v * H)));
  return mask[my * W + mx] === 1;
}

function isOSDCHole(stripX, stripY) {
  if (!osdcMask || !osdcMask.data) return false;

  const { data, W, H, cx, y0 } = osdcMask;
  const PERIOD = R * PERIOD_MULT;

  let dx = stripX - cx;
  if (dx >  PERIOD / 2) dx -= PERIOD;
  if (dx < -PERIOD / 2) dx += PERIOD;

  const px = Math.round(dx + W / 2);
  const py = Math.round(stripY - y0);

  if (px < 0 || px >= W || py < 0 || py >= H) return false;

  // Dot-aware sampling for lower density / larger rings.
  const rad = Math.max(3, Math.round(RING_SCALE * 3));
  const step = Math.max(2, Math.floor(rad / 2));

  for (let oy = -rad; oy <= rad; oy += step) {
    const yy = py + oy;
    if (yy < 0 || yy >= H) continue;

    for (let ox = -rad; ox <= rad; ox += step) {
      const xx = px + ox;
      if (xx < 0 || xx >= W) continue;
      if (data[(yy * W + xx) * 4 + 3] > 50) return true;
    }
  }

  return false;
}

function osdcZone(stripX) {
  if (!osdcMask) return false;

  const PERIOD = R * PERIOD_MULT;
  let dx = stripX - osdcMask.cx;
  if (dx >  PERIOD / 2) dx -= PERIOD;
  if (dx < -PERIOD / 2) dx += PERIOD;

  // Very narrow clean zone only around the OSDC cutout.
  // Do not wipe Australia / Asia just to make room for the text.
  return Math.abs(dx) < R * 0.72;
}

function isHole(stripX, stripY) {
  // OSDC is a cutout.
  if (isOSDCHole(stripX, stripY)) return true;

  // Around OSDC, keep a clean bright/ocean side.
  if (osdcZone(stripX)) return false;

  // Accurate world-map holes from the embedded mask.
  return isWorldHole(stripX, stripY);
}

// ─────────────────────────────────────────────
//  E. Draw one ring-dot
// ─────────────────────────────────────────────
function rgba(rgb, alpha) {
  const a = Math.max(0, Math.min(1, alpha)).toFixed(3);
  return `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${a})`;
}

const OCEAN_RGB = [77, 180, 255];
const LAND_RGB  = [76, 235, 112];
const OSDC_RGB  = [0, 0, 0];

/*
  Three visual states:
  0 = letter enclosed in ring
  1 = circle outline only
  2 = completely filled circle

  isLand decides whether this dot uses the green land palette or the white ocean palette.
*/
function drawDot(x, y, dot, timeSec, region, bulgeScale = 1, alphaMul = 1) {
  const rBase = 8.5 * RING_SCALE * dot.sizeMul * bulgeScale;
  const inner = rBase * 0.52;
  const lineW = Math.max(1.2, rBase * 0.22);

  const a = 0.5 + 0.5 * Math.sin(timeSec * (dot.speed * 1.18) + dot.phase);
  const b = 0.5 + 0.5 * Math.sin(timeSec * (dot.speed2 * 2.05) + dot.phase * 1.91);
  const c = 0.5 + 0.5 * Math.sin(timeSec * (dot.speed * 0.72 + 0.18) + dot.sparklePhase);

  const tw = Math.max(0, Math.min(1, a * 0.56 + b * 0.30 + c * 0.14));

  const lowCut  = 0.20 + dot.flavor * 0.10;
  const highCut = 0.82 + (dot.flavor - 0.5) * 0.08;

  let mode = 0;
  if (tw < lowCut) mode = 1;
  else if (tw > highCut) mode = 2;
  if (c > 0.992) mode = 2;

  const ringAlpha    = (0.58 + tw * 0.34) * alphaMul;
  const glyphAlpha   = (0.45 + tw * 0.40) * alphaMul;
  const outlineAlpha = (0.38 + tw * 0.30) * alphaMul;
  const solidAlpha   = (0.76 + tw * 0.22) * alphaMul;

  const isOSDC = region === 'osdc';
  const baseRGB = region === 'land' ? LAND_RGB : region === 'osdc' ? OSDC_RGB : OCEAN_RGB;

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (isOSDC) {
    if (mode === 0) {
      // black ring + black glyph
      ctx.beginPath();
      ctx.arc(x, y, rBase, 0, Math.PI * 2);
      ctx.fillStyle = rgba(baseRGB, ringAlpha);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(x, y, inner, 0, Math.PI * 2);
      ctx.fillStyle = BG;
      ctx.fill();

      ctx.font = `700 ${Math.round(inner * 1.35)}px monospace`;
      ctx.fillStyle = rgba(baseRGB, glyphAlpha);
      ctx.fillText(dot.glyph, x, y + 0.5);
    } else if (mode === 1) {
      // black outline only
      ctx.beginPath();
      ctx.arc(x, y, rBase * 0.98, 0, Math.PI * 2);
      ctx.strokeStyle = rgba(baseRGB, 0.88);
      ctx.lineWidth = lineW;
      ctx.stroke();
    } else {
      // black filled circle
      ctx.beginPath();
      ctx.arc(x, y, rBase * 0.84, 0, Math.PI * 2);
      ctx.fillStyle = rgba(baseRGB, solidAlpha);
      ctx.fill();
    }

    return;
  }

  if (mode === 0) {
    ctx.beginPath();
    ctx.arc(x, y, rBase, 0, Math.PI * 2);
    ctx.fillStyle = rgba(baseRGB, ringAlpha);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x, y, inner, 0, Math.PI * 2);
    ctx.fillStyle = BG;
    ctx.fill();

    ctx.font = `700 ${Math.round(inner * 1.35)}px monospace`;
    ctx.fillStyle = rgba(baseRGB, glyphAlpha);
    ctx.fillText(dot.glyph, x, y + 0.5);
  } else if (mode === 1) {
    ctx.beginPath();
    ctx.arc(x, y, rBase * 0.98, 0, Math.PI * 2);
    ctx.strokeStyle = rgba(baseRGB, outlineAlpha);
    ctx.lineWidth = lineW;
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.arc(x, y, rBase * 0.84, 0, Math.PI * 2);
    ctx.fillStyle = rgba(baseRGB, solidAlpha);
    ctx.fill();
  }
}

// ─────────────────────────────────────────────
//  F. Resize — keep globe circular and centred
// ─────────────────────────────────────────────
function resize() {
  // Use device pixel ratio for sharpness
  const dpr  = Math.min(window.devicePixelRatio || 1, MAX_DPR);
  const W    = window.innerWidth;
  const H    = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  CX = W / 2;
  CY = H / 2;
  // Globe radius: 46% of the shorter side, capped at 320px
  R  = Math.min(W, H) * 0.46;
  R  = Math.min(R, 320);

  buildDotRows();
  if (osdcLogoImg) buildOSDCMask();
}

// ─────────────────────────────────────────────
//  G. Render loop
//
//  KEY SCROLL DIRECTION FIX:
//  stripX = (baseX − scrollOffset + PERIOD) % PERIOD
//           ↑ SUBTRACT scrollOffset so dots move LEFT as time passes,
//             which maps to showing increasing longitude = eastward rotation.
// ─────────────────────────────────────────────
function render(time) {
  requestAnimationFrame(render);

  if (lastTime === null) lastTime = time;
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  if (paused || document.hidden) {
    return;
  }

  if (time - lastPaintTime < FRAME_TIME) {
    return;
  }
  lastPaintTime = time;

  if (!paused) scrollOffset += SCROLL_SPEED * dt;

  const PERIOD = R * PERIOD_MULT;
  scrollOffset = scrollOffset % PERIOD;

  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, Math.PI * 2);
  ctx.clip();

  const leftEdge = CX - R;

  for (const row of rows) {
    if (Math.abs(row.y) >= R) continue;

    for (const dot of row.dots) {
      const mapX = dot.baseX;              // fixed strip/world coordinate
      const shifted = mapX - scrollOffset; // moving screen coordinate

      for (let copy = -1; copy <= 1; copy++) {
        const screenX = leftEdge + shifted + copy * PERIOD;

        if (screenX < CX - R - 20 || screenX > CX + R + 20) continue;

        const dx = screenX - CX;
        const nx = dx / R;

        const isOSDC = isOSDCHole(mapX, row.y);
        const inOSDCZone = osdcZone(mapX);

        /*
          Subtle fake 3D bulge:
          - dots get slightly smaller and dimmer near the edges
          - rows compress a touch toward the equator near the edges

          Important fix:
          Do NOT fully bulge the OSDC logo. When the logo passes near the
          circular edges, the row compression makes the mark visibly warp.
          So the globe still bulges, but the OSDC logo / its immediate zone
          uses a mostly-flat local projection.
        */
        const depth = Math.sqrt(Math.max(0, 1 - nx * nx));

        const rawBulgeT = Math.max(0, Math.min(2.5, BULGE_AMOUNT));
        const localBulgeT = isOSDC
          ? rawBulgeT * 0.05
          : (inOSDCZone ? rawBulgeT * 0.30 : rawBulgeT);

        const bulgeScale = (0.90 - 0.22 * localBulgeT) + (0.10 + 0.22 * localBulgeT) * depth;
        const alphaMul = (0.82 - 0.18 * localBulgeT) + (0.18 + 0.18 * localBulgeT) * depth;
        const screenY = CY + row.y * ((0.94 - 0.10 * localBulgeT) + (0.06 + 0.10 * localBulgeT) * depth);

        const dy = screenY - CY;
        if (dx * dx + dy * dy > R * R) continue;

        // In the broad OSDC zone, keep non-logo dots as the bright/ocean style.
        // Else, fill continents with green and leave the rest blue.
        const region = isOSDC
          ? 'osdc'
          : ((!inOSDCZone && isWorldHole(mapX, row.y)) ? 'land' : 'ocean');

        drawDot(screenX, screenY, dot, time * 0.001, region, bulgeScale, alphaMul);
      }
    }
  }

  ctx.restore();
}

// ─────────────────────────────────────────────
//  H. Boot
// ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  resize();
});

window.addEventListener('message', (event) => {
  if (event.data?.type !== 'osdc-globe-control') {
    return;
  }

  if (typeof event.data.paused === 'boolean') {
    paused = event.data.paused;
  }
});

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    lastTime = null;
    lastPaintTime = 0;
  }
});

Promise.all([loadWorldMask(), loadOSDCLogo()]).then(() => {
  resize();
  lastTime = null;
  lastPaintTime = 0;
  requestAnimationFrame(render);
});
</script>
</body>
</html>
