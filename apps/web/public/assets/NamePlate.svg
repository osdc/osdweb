<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="256" viewBox="0 0 1024 256">
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ea"/>
      <stop offset="100%" stop-color="#dad3c3"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="130%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1024" height="256" fill="#d9d6cb"/>
  <g transform="translate(84 28)" filter="url(#shadow)">
    <polygon points="0,0 840,0 800,156 40,156" fill="url(#plate)" stroke="#2b2b2b" stroke-width="10"/>
    <text x="420" y="72" text-anchor="middle" fill="#111111" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="700" letter-spacing="6">OSDC</text>
    <text x="420" y="122" text-anchor="middle" fill="#222222" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="600" letter-spacing="1.5">Open Source Developers Community</text>
  </g>
</svg>
