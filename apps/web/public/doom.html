<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doom</title>
  <link rel="stylesheet" href="https://js-dos.com/6.22/current/js-dos.css">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #d7d7d7;
      font-family: "MS Sans Serif", Tahoma, sans-serif;
    }

    .doom-page {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      background: #000;
    }

    .doom-stage {
      flex: 1 1 auto;
      min-height: 0;
    }

    .doom-stage > .dosbox-container {
      width: 100%;
      height: 100%;
    }

    .doom-bar {
      flex: 0 0 auto;
      padding: 6px 8px;
      background: #111;
      border-top: 1px solid #2a2a2a;
      font-size: 11px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="doom-page">
    <div class="doom-stage" id="jsdos"></div>
    <div class="doom-bar">Click inside the game to capture input. Press Escape to release the mouse.</div>
  </div>

  <script src="https://js-dos.com/6.22/current/js-dos.js"></script>
  <script>
    Dos(document.getElementById("jsdos")).run("/games/doom.jsdos");
  </script>
</body>
</html>
